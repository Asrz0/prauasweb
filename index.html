<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universitas Satya Terra Bhinneka</title>
    <link href="css/bootstrap.css" rel="stylesheet">
</head>
<body class="bg-light">

    <header class="bg-success text-white text-center py-5">
        <h2 class="fw-semibold">Universitas Satya Terra Bhinneka</h2>
        <p class="mb-4">Gabung dan Raih Masa Depanmu Bersama Kami</p>
        <button class="btn btn-outline-light px-4 py-2" data-bs-toggle="modal" data-bs-target="#modalPendaftaran">
            Daftar Menjadi Mahasiswa Baru
        </button>
    </header>

    <div class="container my-5">
        <div class="card p-4 shadow-sm mx-auto" style="max-width: 800px;">
            <h5 class="mb-4 fw-bold">Kalkulator Biaya Kuliah</h5>
            <input type="number" class="form-control mb-3 biaya-input" placeholder="Masukkan biaya per semester (cth: 5000000)">
            <input type="number" class="form-control mb-4 semester-input" placeholder="Masukkan jumlah semester (cth: 2, 4, 6)">
            <p class="fw-semibold text-success m-0">Total Biaya untuk <span class="semester-val">0</span> semester: Rp<span class="total-biaya">0</span></p>
        </div>
    </div>

    <div class="modal fade" id="modalPendaftaran" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-6 fw-bold text-secondary" id="modalTitle">Form Pendaftaran Mahasiswa Baru</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="text" class="form-control mb-3" placeholder="Nama">
                    <input type="number" class="form-control mb-3" placeholder="Umur">
                    <input type="text" class="form-control mb-3" placeholder="Asal Sekolah">
                    <select class="form-select mb-3 text-secondary">
                        <option>Pilih Jurusan</option>
                        <option>Informatika</option>
                        <option>Manajemen</option>
                    </select>
                    <input type="text" class="form-control mb-3" placeholder="Nama Orang Tua Laki-laki">
                    <input type="text" class="form-control mb-4" placeholder="Nama Orang Tua Perempuan">
                    
                    <button id="btnKirim" class="btn btn-success w-100 py-2">Kirim</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/bootstrap.bundle.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
